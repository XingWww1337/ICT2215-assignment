<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xi'an — Eternal Capital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>

    :root {
      --crimson:   #7A1E1E;
      --deep-red:  #4A2C2A;
      --gold:      #C9A24A;
      --pale-gold: #F5E9D6;
      --dark:      #1C1C1C;
      --cream:     #F5E9D6;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
    }

    /* Animated gradient background — same technique as ex4 */
    body {
      background: linear-gradient(-45deg, #4A2C2A, #7A1E1E, #4A2C2A, #1C1C1C);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'EB Garamond', Georgia, serif;
      overflow: hidden;
    }

    @keyframes gradient {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Card — same shape as ex4's .box */
    .card {
      position: relative;
      width: 520px;
      padding: 3.5rem 3rem;
      text-align: center;
      border: 1px solid var(--gold);
      border-top-left-radius: 20px;
      border-bottom-right-radius: 20px;
      background: rgba(0, 0, 0, 0.55);
    }

    /* Inner corner accents */
    .card::before {
      content: '';
      position: absolute;
      top: 8px; left: 8px;
      width: 40px; height: 40px;
      border-top: 1px solid var(--gold);
      border-left: 1px solid var(--gold);
    }

    .card::after {
      content: '';
      position: absolute;
      bottom: 8px; right: 8px;
      width: 40px; height: 40px;
      border-bottom: 1px solid var(--gold);
      border-right: 1px solid var(--gold);
    }

    .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.5em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1.2rem;
    }

    .title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.4rem, 6vw, 3.8rem);
      font-weight: 900;
      color: var(--cream);
      line-height: 1.05;
      margin-bottom: 0.2em;
    }

    .title span {
      color: var(--gold);
      display: block;
      font-size: 0.55em;
      font-weight: 400;
      letter-spacing: 0.4em;
      margin-top: 0.3em;
    }

    .divider {
      width: 50px;
      height: 1px;
      background: var(--gold);
      margin: 1.5rem auto;
    }

    .tagline {
      font-size: 1rem;
      font-style: italic;
      color: var(--pale-gold);
      line-height: 1.8;
      margin-bottom: 2rem;
    }

    .cta {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--dark);
      background: var(--gold);
      padding: 0.9rem 2.2rem;
      text-decoration: none;
      border-top-left-radius: 4px;
      border-bottom-right-radius: 4px;
      transition: background 0.3s, transform 0.2s;
    }

    .cta:hover {
      background: var(--pale-gold);
      transform: translateY(-2px);
    }

    @media (max-width: 580px) {
      .card {
        width: 90vw;
        padding: 2.5rem 1.8rem;
      }
    }

  </style>
</head>
<body>

  <div class="card">
    <p class="eyebrow">China's Eternal Capital</p>

    <h1 class="title">
      Xi'an
      <span>西安</span>
    </h1>

    <div class="divider"></div>

    <p class="tagline">
      Thirteen dynasties.<br>
      Three thousand years.<br>
      One city.
    </p>

    <a href="xian.html" class="cta">Explore Xi'an →</a>
  </div>

</body>
</html>
